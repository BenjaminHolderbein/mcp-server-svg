<svg xmlns="http://www.w3.org/2000/svg" width="860" height="540" viewBox="0 0 860 540" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <!-- clip paths for rounded-corner header bars -->
    <clipPath id="clip-cc"><rect x="30" y="70" width="190" height="130" rx="10"/></clipPath>
    <clipPath id="clip-ms"><rect x="325" y="70" width="210" height="130" rx="10"/></clipPath>
    <clipPath id="clip-pw"><rect x="640" y="70" width="190" height="130" rx="10"/></clipPath>
    <clipPath id="clip-sf"><rect x="325" y="310" width="210" height="100" rx="10"/></clipPath>
    <clipPath id="clip-np"><rect x="30" y="310" width="190" height="100" rx="10"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="860" height="540" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">mcp-server-svg — System Diagram</text>

  <!-- ── Claude Code box ── -->
  <g id="claude-code" filter="url(#shadow)">
    <rect x="30" y="70" width="190" height="130" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="30" y="70" width="190" height="32" fill="#f97316" clip-path="url(#clip-cc)"/>
    <text x="125" y="91" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Claude Code</text>
    <text x="125" y="113" text-anchor="middle" font-size="10.5" fill="#94a3b8">(CLI / IDE Extension)</text>
    <text x="125" y="134" text-anchor="middle" font-size="10" fill="#94a3b8">Writes &amp; edits SVG files</text>
    <text x="125" y="151" text-anchor="middle" font-size="10" fill="#94a3b8">Calls MCP tools</text>
    <text x="125" y="168" text-anchor="middle" font-size="10" fill="#94a3b8">Renders images inline</text>
  </g>

  <!-- ── MCP Server box ── -->
  <g id="mcp-server" filter="url(#shadow)">
    <rect x="325" y="70" width="210" height="130" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="325" y="70" width="210" height="32" fill="#3b82f6" clip-path="url(#clip-ms)"/>
    <text x="430" y="91" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">MCP Server</text>
    <text x="430" y="113" text-anchor="middle" font-size="9.5" fill="#64748b">@benjaminholderbein/mcp-server-svg</text>
    <text x="430" y="134" text-anchor="middle" font-size="10" fill="#64748b">index.js — MCP protocol handler</text>
    <text x="430" y="151" text-anchor="middle" font-size="10" fill="#64748b">screenshot.js — render logic</text>
    <text x="430" y="168" text-anchor="middle" font-size="10" fill="#64748b">Exposes: screenshot_svg tool</text>
  </g>

  <!-- ── Playwright / Chromium box ── -->
  <g id="playwright" filter="url(#shadow)">
    <rect x="640" y="70" width="190" height="130" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="640" y="70" width="190" height="32" fill="#22c55e" clip-path="url(#clip-pw)"/>
    <text x="735" y="91" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Playwright Chromium</text>
    <text x="735" y="113" text-anchor="middle" font-size="10.5" fill="#64748b">(Headless Browser)</text>
    <text x="735" y="134" text-anchor="middle" font-size="10" fill="#64748b">Wraps SVG in HTML page</text>
    <text x="735" y="151" text-anchor="middle" font-size="10" fill="#64748b">Sets viewport to SVG size</text>
    <text x="735" y="168" text-anchor="middle" font-size="10" fill="#64748b">Returns PNG screenshot</text>
  </g>

  <!-- ── SVG File box ── -->
  <g id="svg-file" filter="url(#shadow)">
    <rect x="325" y="310" width="210" height="100" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="325" y="310" width="210" height="32" fill="#a855f7" clip-path="url(#clip-sf)"/>
    <text x="430" y="331" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">SVG File / Markup</text>
    <text x="430" y="357" text-anchor="middle" font-size="10" fill="#64748b">file_path or svg_content param</text>
    <text x="430" y="374" text-anchor="middle" font-size="10" fill="#64748b">Read from disk by screenshot.js</text>
    <text x="430" y="391" text-anchor="middle" font-size="10" fill="#64748b">or passed as raw SVG string</text>
  </g>

  <!-- ── npm / npx box ── -->
  <g id="npx" filter="url(#shadow)">
    <rect x="30" y="310" width="190" height="100" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="30" y="310" width="190" height="32" fill="#ef4444" clip-path="url(#clip-np)"/>
    <text x="125" y="331" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">npm Registry</text>
    <text x="125" y="357" text-anchor="middle" font-size="10" fill="#64748b">Distributed via npx</text>
    <text x="125" y="374" text-anchor="middle" font-size="10" fill="#64748b">Zero-install: pulled automatically</text>
    <text x="125" y="391" text-anchor="middle" font-size="10" fill="#64748b">by Claude Code on first use</text>
  </g>

  <!-- ── Arrows ── -->

  <!-- Claude Code → MCP Server: tool call (stdio) -->
  <line x1="220" y1="128" x2="323" y2="128" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="238" y="100" width="70" height="16" rx="4" fill="#eff6ff"/>
  <text x="273" y="111" text-anchor="middle" font-size="9" fill="#3b82f6" font-weight="600">stdio / MCP</text>

  <!-- MCP Server → Claude Code: base64 PNG -->
  <line x1="323" y1="148" x2="221" y2="148" stroke="#f97316" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <rect x="238" y="151" width="70" height="16" rx="4" fill="#fff7ed"/>
  <text x="273" y="162" text-anchor="middle" font-size="9" fill="#f97316" font-weight="600">base64 PNG</text>

  <!-- MCP Server → Playwright -->
  <line x1="535" y1="128" x2="638" y2="128" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="551" y="100" width="76" height="16" rx="4" fill="#f0fdf4"/>
  <text x="589" y="111" text-anchor="middle" font-size="9" fill="#16a34a" font-weight="600">HTML + SVG</text>

  <!-- Playwright → MCP Server -->
  <line x1="638" y1="148" x2="536" y2="148" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="564" y="152" width="76" height="16" rx="4" fill="#f9fafb"/>
  <text x="602" y="163" text-anchor="middle" font-size="9" fill="#6b7280" font-weight="600">PNG buffer</text>

  <!-- SVG File → MCP Server (reads file) -->
  <line x1="430" y1="308" x2="430" y2="202" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <rect x="436" y="258" width="66" height="16" rx="4" fill="#faf5ff"/>
  <text x="469" y="269" text-anchor="middle" font-size="9" fill="#a855f7" font-weight="600">readFile()</text>

  <!-- Claude Code → SVG File (writes/edits): down below both bottom boxes, then right -->
  <!-- Claude Code → SVG File: diagonal from bottom-right corner of Claude Code box to clear npm box -->
  <line x1="220" y1="190" x2="323" y2="308" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-orange)"/>
  <rect x="234" y="240" width="72" height="16" rx="4" fill="#fff7ed"/>
  <text x="270" y="251" text-anchor="middle" font-size="9" fill="#f97316" font-weight="600">writes / edits</text>

  <!-- npm Registry → Claude Code (pulls server) -->
  <line x1="125" y1="308" x2="125" y2="202" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-red)"/>

  <!-- npx pull label — sits beside the arrow -->
  <rect x="132" y="248" width="56" height="16" rx="4" fill="#fef2f2"/>
  <text x="160" y="259" text-anchor="middle" font-size="9" fill="#ef4444" font-weight="600">npx pull</text>

  <!-- ── Legend ── -->
  <g transform="translate(30, 510)">
    <text x="0" y="0" font-size="10" font-weight="600" fill="#475569">Legend:</text>
    <line x1="60" y1="-5" x2="90" y2="-5" stroke="#3b82f6" stroke-width="2"/>
    <polygon points="88,-8 94,-5 88,-2" fill="#3b82f6"/>
    <text x="96" y="-1" font-size="10" fill="#475569">MCP tool call</text>
    <line x1="190" y1="-5" x2="220" y2="-5" stroke="#f97316" stroke-width="2"/>
    <polygon points="218,-8 224,-5 218,-2" fill="#f97316"/>
    <text x="226" y="-1" font-size="10" fill="#475569">image response / file edit</text>
    <line x1="400" y1="-5" x2="430" y2="-5" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="436" y="-1" font-size="10" fill="#475569">distribution / file I/O</text>
  </g>
</svg>
